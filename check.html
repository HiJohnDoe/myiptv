<!DOCTYPE html>
<html>
<head>
    <title>IPTV 质检员</title>
    <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f2f2f7; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        #bar-box { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: #34c759; transition: 0.3s; }
        #log { font-size: 11px; height: 150px; overflow-y: auto; background: #1c1e21; color: #34c759; padding: 10px; border-radius: 8px; }
        button { background: #007aff; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        button:disabled { background: #ccc; }
        /* 手动同步按钮样式 */
        #retry-btn { background: #34c759; display: none; } 
    </style>
</head>
<body>
    <div class="card">
        <h3>📡 本地网络质检</h3>
        <div id="bar-box"><div id="bar"></div></div>
        <button id="btn" onclick="startCheck()">开始质检</button>
        <button id="retry-btn" onclick="uploadToWorker()">🔄 同步失败？点击重试</button>
        <div id="log">>> 准备就绪</div>
    </div>
    <script>
        const CF_WORKER_URL = '{{CF_WORKER_URL}}'; 
        // 全局变量，用于保存检测成功的 M3U 内容
        let cachedM3u = "";

        async function startCheck() {
            const btn = document.getElementById('btn');
            const log = document.getElementById('log');
            const bar = document.getElementById('bar');
            const retryBtn = document.getElementById('retry-btn');
            
            btn.disabled = true;
            retryBtn.style.display = "none";
            log.innerHTML = "<div>🚀 开始检测...</div>";

            try {
                const res = await fetch('./raw_list.json');
                const channels = await res.json();
                let m3u = "#EXTM3U\n";
                let ok = 0;

                for (let i = 0; i < channels.length; i++) {
                    const ch = channels[i];
                    try {
                        const controller = new AbortController();
                        // 依然保留 2000ms 超时，这是你原始代码的逻辑
                        setTimeout(() => controller.abort(), 2000);
                        
                        // 使用你原始的请求逻辑：不做 mode 设置，不做 headers 设置
                        await fetch(ch.url, { signal: controller.signal });
                        
                        m3u += `#EXTINF:-1, ${ch.name}\n${ch.url}\n`;
                        ok++;
                        log.innerHTML += `<div>✅ ${ch.name}</div>`;
                    } catch (e) {
                        log.innerHTML += `<div style="color:#ff3b30">❌ ${ch.name}</div>`;
                    }
                    bar.style.width = `${((i+1)/channels.length)*100}%`;
                    log.scrollTop = log.scrollHeight;
                }

                // 检测结束后，将结果存入全局变量
                cachedM3u = m3u;
                log.innerHTML += `<div>🎉 检测完成！可用: ${ok}</div>`;
                
                // 触发自动上传
                await uploadToWorker();

            } catch (err) { 
                log.innerHTML += `<div style="color:red">错误: ${err.message}</div>`; 
                btn.disabled = false;
            }
        }

        // 提取出来的上传逻辑
        async function uploadToWorker() {
            const log = document.getElementById('log');
            const retryBtn = document.getElementById('retry-btn');
            
            if (!cachedM3u) return;

            log.innerHTML += `<div>☁️ 正在同步至云端 KV...</div>`;
            log.scrollTop = log.scrollHeight;

            try {
                // 自动处理注入失败的情况
                const targetUrl = CF_WORKER_URL.includes('{{') ? 'https://tv.ticastle.top' : CF_WORKER_URL;

                const response = await fetch(targetUrl, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ m3u_content: cachedM3u }) 
                });

                if (response.ok) {
                    log.innerHTML += `<div style="color:#34c759">🎉 同步完成！数据已入库</div>`;
                    retryBtn.style.display = "none";
                } else {
                    throw new Error('Worker 响应失败');
                }
            } catch (err) {
                log.innerHTML += `<div style="color:#ff3b30">❌ 同步失败，点击绿色按钮重试</div>`;
                retryBtn.style.display = "block";
            }
            log.scrollTop = log.scrollHeight;
        }

        // 自动化识别逻辑
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('auto') === 'true') {
                setTimeout(startCheck, 2000);
            }
        };
    </script>
</body>
</html>
