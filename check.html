<!DOCTYPE html>
<html>
<head>
    <title>IPTV 质检员</title>
    <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f2f2f7; color: #1c1c1e; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        #bar-box { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: #34c759; transition: 0.3s; }
        #log { font-size: 11px; height: 150px; overflow-y: auto; background: #1c1e21; color: #34c759; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        
        /* 按钮样式 */
        .btn-primary { background: #007aff; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .btn-primary:active { transform: scale(0.98); }
        
        /* 补传按钮样式 - 初始隐藏 */
        #retry-btn { display: none; background: #34c759; margin-top: 10px; border: 2px solid #2ecc71; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(52, 199, 89, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h3>📡 本地网络质检</h3>
        <div id="bar-box"><div id="bar"></div></div>
        <button id="btn" class="btn-primary" onclick="startCheck()">开始质检</button>
        <button id="retry-btn" class="btn-primary" onclick="uploadToWorker()">🔄 同步失败，点击重试</button>
        <div id="log" style="margin-top:15px">>> 准备就绪</div>
    </div>

    <script>
        // GitHub Action 会自动替换这个地址，或者你手动填入
        const CF_WORKER_URL = '{{CF_WORKER_URL}}'; 
        
        // 全局变量：保存检测好的内容，防止重复检测
        let cachedM3uContent = "";

        async function startCheck() {
            const btn = document.getElementById('btn');
            const log = document.getElementById('log');
            const bar = document.getElementById('bar');
            
            btn.disabled = true;
            log.innerHTML = "<div>🚀 正在加载待测清单...</div>";
            
            try {
                const res = await fetch('./raw_list.json');
                const channels = await res.json();
                let m3u = "#EXTM3U\n";
                let ok = 0;

                for (let i = 0; i < channels.length; i++) {
                    const ch = channels[i];
                    try {
                        const controller = new AbortController();
                        // 2秒超时，提高检测效率
                        const timeoutId = setTimeout(() => controller.abort(), 2000);
                        
                        await fetch(ch.url, { mode: 'no-cors', signal: controller.signal });
                        clearTimeout(timeoutId);
                        
                        m3u += `#EXTINF:-1, ${ch.name}\n${ch.url}\n`;
                        ok++;
                        log.innerHTML += `<div>✅ ${ch.name}</div>`;
                    } catch (e) {
                        log.innerHTML += `<div style="color:#ff3b30">❌ ${ch.name}</div>`;
                    }
                    
                    bar.style.width = `${((i+1)/channels.length)*100}%`;
                    log.scrollTop = log.scrollHeight;
                }

                // 保存到全局变量
                cachedM3uContent = m3u;
                log.innerHTML += `<div style="color:#34c759; font-weight:bold;">🎉 检测完成！可用: ${ok}</div>`;
                
                // 执行自动上传
                await uploadToWorker();

            } catch (err) { 
                log.innerHTML += `<div style="color:#ff3b30">错误: ${err.message}</div>`; 
                btn.disabled = false;
            }
        }

        async function uploadToWorker() {
            const log = document.getElementById('log');
            const retryBtn = document.getElementById('retry-btn');
            
            if (!cachedM3uContent) return;

            log.innerHTML += `<div>☁️ 正在同步至云端 KV...</div>`;
            log.scrollTop = log.scrollHeight;
            retryBtn.style.display = "none";

            try {
                // 如果地址包含 {{...}} 说明 Action 注入失效，尝试识别当前环境
                const finalUrl = CF_WORKER_URL.includes('{{') ? 'https://tv.ticastle.top' : CF_WORKER_URL;

                const response = await fetch(finalUrl, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ m3u_content: cachedM3uContent }) 
                });

                if (response.ok) {
                    log.innerHTML += `<div style="color:#34c759; font-weight:bold;">✅ 同步成功！数据已入库。</div>`;
                    retryBtn.style.display = "none";
                } else {
                    throw new Error(`服务器响应错误: ${response.status}`);
                }
            } catch (err) {
                log.innerHTML += `<div style="color:#ff3b30; font-weight:bold;">❌ 同步失败: ${err.message}</div>`;
                log.innerHTML += `<div>⚠️ 请检查 Worker 绑定或证书，然后点击上方绿色按钮重试。</div>`;
                retryBtn.style.display = "block"; // 显示重试按钮
            }
            log.scrollTop = log.scrollHeight;
        }

        // 自动化识别逻辑
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('auto') === 'true') {
                document.getElementById('log').innerHTML += "<div>🤖 检测到自动化指令...</div>";
                setTimeout(startCheck, 1500);
            }
        };
    </script>
</body>
</html>
